<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#FFFFFF">
  <meta name="description" content="Nihat Balık Restaurant — Dijital Menü">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Nihat Balık Restaurant — Menü</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header" id="site-header">
    <img
      id="site-logo"
      src="images/logo.png"
      alt="Nihat Balık Restaurant"
      class="logo"
      onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='flex'"
    >
    <div id="logo-fallback" class="logo-fallback" style="display:none">
      <span class="logo-nihat">Nihat</span>
      <span class="logo-balik">Balık Restaurant</span>
    </div>
  </header>

  <nav class="category-nav" id="category-nav" aria-label="Menü kategorileri">
    <div class="nav-inner" id="nav-tabs" role="tablist">
    </div>
  </nav>

  <main id="menu-content" class="main-content">
    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
    </div>
  </main>

  <footer class="site-footer">
    <p id="footer-text">Nihat Balık Restaurant © 2026</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
